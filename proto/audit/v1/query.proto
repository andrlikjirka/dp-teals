syntax = "proto3";
package audit.v1;

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";
import "audit/v1/event.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/andrlikjirka/dp-teals/proto/audit/v1;auditv1";

service QueryService {
  rpc GetAuditEvent (GetAuditEventRequest) returns (GetAuditEventResponse) {}
  rpc ListAuditEvents (ListAuditEventsRequest) returns (ListAuditEventsResponse) {}
}

message GetAuditEventRequest {
  string event_id = 1 [(buf.validate.field).string.uuid = true];
}

message GetAuditEventResponse {
  google.protobuf.Struct event = 1;
  optional google.protobuf.Struct revealed_metadata = 2;
  int64 leaf_index = 3;
  string producer_sign_token = 4;
}

message ListAuditEventsRequest {
  AuditEventFilter filter = 1;
  optional string cursor = 2;
}

message ListAuditEventsResponse {
  repeated ListAuditEventsItem items = 1;
  int64 ledger_size = 2;
  optional string next_cursor = 3;
}

message AuditEventFilter {
  repeated Action actions = 1; // any of the listed actions, empty = all actions
  repeated Actor.Type actor_types = 2; // any of the listed actor types, empty = all types
  string actor_id = 3;
  string subject_id = 4;
  string resource_id = 5;
  string resource_name = 6;
  repeated Result.Status result_statuses = 7; // any of the listed result statuses, empty = all statuses
  google.protobuf.Timestamp timestamp_from = 8; // inclusive lower bound on event timestamp
  google.protobuf.Timestamp timestamp_to = 9;  // inclusive upper bound on event timestamp.
}

message ListAuditEventsItem {
  google.protobuf.Struct event = 1;
  optional google.protobuf.Struct revealed_metadata = 2;
  int64 leaf_index = 3;
  string producer_sign_token = 4;
}
