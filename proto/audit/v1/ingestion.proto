syntax = "proto3";

package audit.v1;

import "buf/validate/validate.proto";
import "audit/v1/event.proto";

option go_package = "github.com/andrlikjirka/dp-teals/proto/audit/v1;ingestionv1";

// The audit ingestion service definition.
service IngestionService {
  rpc Append (AppendRequest) returns (AppendResponse) {}
}

// The request message containing the audit event to be appended.
message AppendRequest {
  AuditEvent event = 1 [(buf.validate.field).required = true];
}

// The response message containing the ID of the appended audit event.
message AppendResponse {
  string event_id = 1;
}
